name: Build and deploy to gh-pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: nopreserveroot/latexmk

    steps:
#     https://github.com/ernestchu/cv/releases/download/fonts/fonts.tar.gz
    - uses: actions/checkout@v3

    - name: Build
      run: |
        apt-get update && apt-get install make && make

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        
