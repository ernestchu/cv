name: Build and deploy to gh-pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    container: nopreserveroot/latexmk
#     runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build
      run: |
        make

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: .
        
